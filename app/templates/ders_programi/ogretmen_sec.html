{% extends "ders_programi/_layout.html" %}
{% block title %}Öğretmen Seçin{% endblock %}
{% block breadcrumb %}
<li class="breadcrumb-item active">Öğretmen Programı</li>
{% endblock %}
{% block ders_programi_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-person-workspace"></i> Öğretmen Ders Programı</h2>
    <a href="{{ url_for('ders_programi.program.index') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Geri
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="get" action="{{ url_for('ders_programi.program.ogretmen_programi') }}">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label">Öğretmen Seçin</label>
                    <select name="ogretmen_id" class="form-select" required>
                        <option value="">-- Öğretmen Seçiniz --</option>
                        {% for ogretmen in ogretmenler %}
                        <option value="{{ ogretmen.id }}">{{ ogretmen.ad }} {{ ogretmen.soyad }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Dönem</label>
                    <input type="text" name="donem" class="form-control" placeholder="2025-2026">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-search"></i> Göster
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
