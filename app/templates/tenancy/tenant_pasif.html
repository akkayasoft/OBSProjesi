<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Erisim askiya alindi</title>
    <style>
        body { font-family: -apple-system, Segoe UI, sans-serif; background: #fff3cd;
               display: flex; min-height: 100vh; align-items: center; justify-content: center; }
        .card { background: white; padding: 40px 56px; border-radius: 12px;
                box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; max-width: 480px; }
        h1 { margin: 0 0 12px; color: #856404; font-size: 24px; }
        p { color: #6c757d; line-height: 1.6; }
        .kurum { font-weight: 600; color: #343a40; }
    </style>
</head>
<body>
<div class="card">
    <h1>⏸ Erisim gecici olarak kapali</h1>
    <p class="kurum">{{ tenant.ad }}</p>
    <p>
        Bu kurum icin erisim su an askiya alinmis durumda.
        {% if tenant.abonelik_bitis %}
        Aboneliginiz <strong>{{ tenant.abonelik_bitis.strftime('%d.%m.%Y') }}</strong> tarihinde sona erdi.
        {% endif %}
    </p>
    <p>
        Hizmet saglayicinizla iletisime gecin.
    </p>
</div>
</body>
</html>
