<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" font-family="Inter, system-ui, sans-serif">
  <rect width="1280" height="400" fill="#f4f6f9"/>
  <rect x="0" y="0" width="1280" height="60" fill="#0d6efd"/>
  <text x="24" y="38" font-size="20" fill="#fff">🎓 Bilfen Dershanesi</text>
  <text x="1130" y="38" font-size="13" fill="#fff">🔔 3</text>
  <rect x="1170" y="14" width="100" height="32" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="1180" y="35" font-size="13" fill="#fff">👤 Ahmet Y.</text>
  <text x="1255" y="35" font-size="11" fill="#fff">▲</text>

  <!-- Dropdown -->
  <g filter="url(#shadow)">
    <rect x="1080" y="60" width="190" height="180" rx="8" fill="#fff" stroke="#dee2e6"/>
  </g>
  <text x="1100" y="85" font-size="11" fill="#6c757d">Sistem Yöneticisi</text>
  <line x1="1090" y1="98" x2="1260" y2="98" stroke="#e9ecef"/>

  <text x="1100" y="125" font-size="13" fill="#495057">👤 Profilim</text>
  <text x="1100" y="155" font-size="13" fill="#495057">⚙️  Ayarlar</text>
  <text x="1100" y="185" font-size="13" fill="#495057">🔒 Şifre Değiştir</text>
  <line x1="1090" y1="200" x2="1260" y2="200" stroke="#e9ecef"/>
  <text x="1100" y="225" font-size="13" fill="#dc3545" font-weight="600">🚪 Çıkış Yap</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <text x="600" y="280" text-anchor="middle" font-size="14" fill="#6c757d">Üst sağ köşedeki kullanıcı menüsünden çıkış yapılır</text>
  <line x1="850" y1="50" x2="1180" y2="34" stroke="#dc3545" stroke-width="2" stroke-dasharray="4 4"/>
</svg>
