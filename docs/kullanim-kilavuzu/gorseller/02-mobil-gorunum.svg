<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 720" font-family="Inter, system-ui, sans-serif">
  <rect width="850" height="720" fill="#f4f6f9"/>

  <!-- Phone 1: dashboard with hamburger -->
  <g transform="translate(40,40)">
    <rect width="350" height="640" rx="32" fill="#212529"/>
    <rect x="14" y="14" width="322" height="612" rx="22" fill="#fff"/>
    <!-- notch -->
    <rect x="120" y="20" width="110" height="22" rx="11" fill="#212529"/>
    <!-- navbar -->
    <rect x="14" y="50" width="322" height="50" fill="#0d6efd"/>
    <text x="34" y="80" font-size="18" fill="#fff">☰</text>
    <text x="64" y="80" font-size="14" fill="#fff" font-weight="700">Bilfen</text>
    <text x="305" y="80" font-size="13" fill="#fff" text-anchor="end">🔔 3</text>

    <text x="36" y="135" font-size="14" font-weight="700" fill="#212529">Hoş geldiniz</text>
    <text x="36" y="155" font-size="11" fill="#6c757d">08.05.2026</text>

    <!-- KPI stack -->
    <rect x="36" y="175" width="278" height="70" rx="6" fill="#fff" stroke="#dee2e6"/>
    <rect x="36" y="175" width="3" height="70" fill="#0d6efd"/>
    <text x="50" y="195" font-size="10" fill="#6c757d">AKTIF ÖĞRENCİ</text>
    <text x="50" y="225" font-size="22" font-weight="700">247</text>

    <rect x="36" y="255" width="278" height="70" rx="6" fill="#fff" stroke="#dee2e6"/>
    <rect x="36" y="255" width="3" height="70" fill="#198754"/>
    <text x="50" y="275" font-size="10" fill="#6c757d">BU AY TAHSİLAT</text>
    <text x="50" y="305" font-size="20" font-weight="700" fill="#198754">38.500 ₺</text>

    <rect x="36" y="335" width="278" height="70" rx="6" fill="#fff" stroke="#dee2e6"/>
    <rect x="36" y="335" width="3" height="70" fill="#dc3545"/>
    <text x="50" y="355" font-size="10" fill="#6c757d">GECİKEN</text>
    <text x="50" y="385" font-size="22" font-weight="700" fill="#dc3545">12</text>

    <text x="36" y="445" font-size="13" font-weight="700">📅 Günün Programı</text>
    <text x="36" y="468" font-size="11" fill="#495057">09:00 9-A Matematik</text>
    <text x="36" y="486" font-size="11" fill="#495057">10:45 9-B Türkçe</text>
    <text x="36" y="504" font-size="11" fill="#495057">13:00 10-A Fizik</text>

    <text x="175" y="600" text-anchor="middle" font-size="10" fill="#6c757d">— mobil görünüm —</text>
  </g>

  <!-- Phone 2: sidebar açık -->
  <g transform="translate(440,40)">
    <rect width="350" height="640" rx="32" fill="#212529"/>
    <rect x="14" y="14" width="322" height="612" rx="22" fill="#fff"/>
    <rect x="120" y="20" width="110" height="22" rx="11" fill="#212529"/>

    <!-- Sidebar slide-in -->
    <rect x="14" y="50" width="240" height="576" fill="#212529"/>
    <text x="32" y="80" font-size="14" fill="#fff" font-weight="700">Menü</text>
    <text x="240" y="80" font-size="14" fill="#fff" text-anchor="end">✕</text>

    <rect x="22" y="100" width="220" height="32" rx="4" fill="rgba(255,255,255,0.15)"/>
    <text x="36" y="120" font-size="12" fill="#fff" font-weight="600">🏠 Ana Sayfa</text>

    <g font-size="12" fill="rgba(255,255,255,0.85)">
      <text x="36" y="150">📋 Kayıt</text>
      <text x="36" y="178">📅 Devamsızlık</text>
      <text x="36" y="206">📝 Not Defteri</text>
      <text x="36" y="234">🎓 Karne</text>
      <text x="36" y="262">📊 Deneme Sınavı</text>
      <text x="36" y="290">💻 Online Sınav</text>
      <text x="36" y="318">💰 Muhasebe</text>
      <text x="36" y="346">👥 Personel</text>
      <text x="36" y="374">📈 Raporlar</text>
      <text x="36" y="402">⚙️  Ayarlar</text>
    </g>

    <!-- Overlay over content -->
    <rect x="254" y="14" width="82" height="612" fill="rgba(0,0,0,0.5)"/>

    <text x="175" y="600" text-anchor="middle" font-size="10" fill="#6c757d">— sidebar açık —</text>
  </g>
</svg>
