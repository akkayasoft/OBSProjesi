    <text x="542" y="293" font-size="13" fill="#212529" font-weight="600">8 ▾</text>

    <text x="670" y="260">İndirim (₺)</text>
    <rect x="670" y="270" width="160" height="36" rx="4" fill="#fff" stroke="#ced4da"/>
