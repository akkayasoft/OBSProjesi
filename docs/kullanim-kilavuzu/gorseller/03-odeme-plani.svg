    <text x="540" y="580" fill="#adb5bd">4 × 1.500,00</text>
  </g>

  <line x1="270" y1="600" x2="1260" y2="600" stroke="#e9ecef"/>
  <text x="290" y="625" font-size="12" fill="#212529" font-weight="600">Toplam: 12.000,00 ₺</text>

  <!-- Footer -->
