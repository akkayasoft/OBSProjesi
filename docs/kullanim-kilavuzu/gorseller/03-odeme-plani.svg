    <text x="862" y="293" font-size="13" fill="#212529">10.05.2026</text>

    <rect x="1050" y="270" width="180" height="36" rx="4" fill="#198754"/>
    <text x="1140" y="293" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">↻ HESAPLA</text>

    <text x="290" y="330" font-size="11" fill="#198754">✓ 8 taksit × 1.500 ₺ = 12.000 ₺ (eşit dağılım)</text>
  </g>

  <!-- Generated installments table -->
  <rect x="270" y="370" width="990" height="280" rx="6" fill="#fff" stroke="#dee2e6"/>
  <rect x="270" y="370" width="990" height="36" fill="#f8f9fa"/>
