  <rect x="290" y="678" width="120" height="24" rx="4" fill="#fff" stroke="#dee2e6"/>
  <text x="350" y="694" text-anchor="middle" font-size="11" fill="#6c757d">‹ Önceki</text>
  <rect x="1100" y="676" width="140" height="28" rx="4" fill="#198754"/>
  <text x="1170" y="694" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">✓ KAYDI BİTİR</text>
