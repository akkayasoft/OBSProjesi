    <text x="950" y="463" fill="#0d6efd">Düzenle · Sil</text>

    <text x="290" y="491" fill="#212529" font-weight="600">2</text>
    <text x="360" y="491" fill="#495057">10.06.2026</text>
    <text x="540" y="491" fill="#212529" font-weight="600">1.500,00</text>
    <rect x="710" y="478" width="75" height="22" rx="11" fill="#fff3cd"/>
    <text x="747" y="493" text-anchor="middle" font-size="10" fill="#664d03" font-weight="600">Bekliyor</text>
    <text x="950" y="491" fill="#0d6efd">Düzenle · Sil</text>

    <text x="290" y="519" fill="#212529" font-weight="600">3</text>
    <text x="360" y="519" fill="#495057">10.07.2026</text>
    <text x="540" y="519" fill="#212529" font-weight="600">1.500,00</text>
    <rect x="710" y="506" width="75" height="22" rx="11" fill="#fff3cd"/>
    <text x="747" y="521" text-anchor="middle" font-size="10" fill="#664d03" font-weight="600">Bekliyor</text>
    <text x="950" y="519" fill="#0d6efd">Düzenle · Sil</text>

    <text x="290" y="547" fill="#212529" font-weight="600">4</text>
    <text x="360" y="547" fill="#495057">10.08.2026</text>
    <text x="540" y="547" fill="#212529" font-weight="600">1.500,00</text>
    <rect x="710" y="534" width="75" height="22" rx="11" fill="#fff3cd"/>
    <text x="747" y="549" text-anchor="middle" font-size="10" fill="#664d03" font-weight="600">Bekliyor</text>
    <text x="950" y="547" fill="#0d6efd">Düzenle · Sil</text>

    <text x="290" y="580" fill="#adb5bd">5–8</text>
