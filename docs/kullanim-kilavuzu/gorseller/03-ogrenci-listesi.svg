    <text x="500" y="250">TC</text>
    <text x="620" y="250">TELEFON</text>
    <text x="780" y="250">SINIF</text>
    <text x="870" y="250">VELİ</text>
    <text x="1020" y="250">DURUM</text>
    <text x="1120" y="250">İŞLEM</text>
