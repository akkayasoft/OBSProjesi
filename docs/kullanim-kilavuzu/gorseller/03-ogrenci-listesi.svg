  <!-- Pagination -->
  <text x="290" y="660" font-size="12" fill="#6c757d">Toplam 247 kayıt</text>
  <g>
    <rect x="1080" y="645" width="34" height="30" rx="4" fill="#fff" stroke="#dee2e6"/>
    <text x="1097" y="664" text-anchor="middle" font-size="13">‹</text>
    <rect x="1118" y="645" width="34" height="30" rx="4" fill="#0d6efd"/>
