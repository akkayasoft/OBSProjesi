  <rect x="1090" y="85" width="170" height="40" rx="6" fill="#198754"/>
  <text x="1175" y="111" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">+ YENİ ÖĞRENCİ</text>

  <!-- Filter bar -->
  <rect x="270" y="150" width="990" height="60" rx="6" fill="#fff" stroke="#dee2e6"/>
