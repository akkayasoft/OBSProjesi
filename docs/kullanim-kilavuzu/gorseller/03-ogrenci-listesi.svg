    <text x="1042" y="447" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Pasif</text>
    <rect x="1115" y="430" width="60" height="26" rx="4" fill="#0d6efd"/>
    <text x="1145" y="447" text-anchor="middle" font-size="11" fill="#fff">Aç ›</text>
    <line x1="270" y1="465" x2="1260" y2="465" stroke="#f1f3f5"/>

    <text x="290" y="495" fill="#212529" font-weight="600">Demo Öğrenci 5</text>
    <text x="500" y="495" fill="#6c757d">12345678905</text>
    <text x="620" y="495" fill="#495057">0536 555 66 77</text>
    <text x="780" y="495" fill="#495057">9-B</text>
    <text x="870" y="495" fill="#495057">Demo Veli 5</text>
    <rect x="1010" y="482" width="60" height="22" rx="11" fill="#198754"/>
    <text x="1040" y="497" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Aktif</text>
    <rect x="1115" y="480" width="60" height="26" rx="4" fill="#0d6efd"/>
