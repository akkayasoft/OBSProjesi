<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 500" font-family="Inter, system-ui, sans-serif">
  <rect width="1280" height="500" fill="#f4f6f9"/>
  <rect x="0" y="0" width="1280" height="60" fill="#0d6efd"/>
  <text x="24" y="38" font-size="20" fill="#fff">🎓 Bilfen</text>
  <rect x="0" y="60" width="240" height="440" fill="#212529"/>

  <!-- Success page after attendance saved -->
  <text x="270" y="100" font-size="22" font-weight="700" fill="#212529">✓ Yoklama Kaydedildi</text>

  <!-- Toast top right -->
  <g filter="url(#sh)">
    <rect x="900" y="80" width="360" height="90" rx="8" fill="#198754"/>
  </g>
  <text x="920" y="115" font-size="20" fill="#fff">✓</text>
  <text x="950" y="115" font-size="14" fill="#fff" font-weight="700">Başarılı</text>
  <text x="920" y="140" font-size="12" fill="#fff" opacity="0.95">Yoklama kaydedildi.</text>
  <text x="920" y="158" font-size="12" fill="#fff" opacity="0.95">2 veliye SMS gönderildi (1 sn önce)</text>

  <!-- SMS preview -->
  <text x="270" y="160" font-size="13" fill="#6c757d" font-weight="600">VELİYE GİDEN SMS ÖRNEĞİ</text>
  <g transform="translate(270,180)">
    <rect width="320" height="240" rx="20" fill="#212529"/>
    <rect x="6" y="30" width="308" height="200" rx="14" fill="#f0f0f0"/>
    <rect x="120" y="36" width="80" height="14" rx="7" fill="#212529"/>
    <text x="20" y="80" font-size="10" fill="#6c757d">📱 +90 5XX XXX 12 34 — Şimdi</text>
    <rect x="20" y="90" width="280" height="100" rx="14" fill="#fff"/>
    <text x="34" y="115" font-size="11" fill="#212529" font-weight="600">Bilfen Dershanesi</text>
    <text x="34" y="135" font-size="11" fill="#212529">Sayın veli,</text>
    <text x="34" y="155" font-size="11" fill="#212529">Demo Öğrenci 2 bugün okulda</text>
    <text x="34" y="172" font-size="11" fill="#212529">görünmemektedir.</text>
    <text x="34" y="190" font-size="10" fill="#6c757d">Bilfen · 08.05 14:23</text>
  </g>

  <!-- Right: detail flow -->
  <text x="660" y="195" font-size="13" font-weight="700" fill="#212529">SMS ARKA PLAN AKIŞI</text>
  <line x1="660" y1="207" x2="1260" y2="207" stroke="#dee2e6"/>

  <g font-size="12">
    <circle cx="680" cy="240" r="12" fill="#198754"/>
    <text x="680" y="245" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">1</text>
    <text x="710" y="245" fill="#212529" font-weight="600">Yoklama kaydedildi</text>
    <text x="710" y="262" fill="#6c757d">Sistem 'yok' işaretli öğrencileri tespit etti</text>

    <circle cx="680" cy="295" r="12" fill="#198754"/>
    <text x="680" y="300" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">2</text>
    <text x="710" y="300" fill="#212529" font-weight="600">Veli telefonları çekildi</text>
    <text x="710" y="317" fill="#6c757d">Demo Öğrenci 2 → 0533 222 33 44</text>

    <circle cx="680" cy="350" r="12" fill="#198754"/>
    <text x="680" y="355" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">3</text>
    <text x="710" y="355" fill="#212529" font-weight="600">SMS sağlayıcıya istek</text>
    <text x="710" y="372" fill="#6c757d">İletimerkezi API · gönderici "BILFEN"</text>

    <circle cx="680" cy="405" r="12" fill="#198754"/>
    <text x="680" y="410" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">4</text>
    <text x="710" y="410" fill="#212529" font-weight="600">Teslim raporu</text>
    <text x="710" y="427" fill="#6c757d">Operatörden alındı, kayıt edildi</text>

    <circle cx="680" cy="460" r="12" fill="#fff" stroke="#0d6efd" stroke-width="2"/>
    <text x="680" y="465" text-anchor="middle" font-size="11" fill="#0d6efd" font-weight="700">5</text>
    <text x="710" y="465" fill="#212529" font-weight="600">Veli SMS'i alır (5-30 sn)</text>
  </g>

  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.2"/>
    </filter>
  </defs>
</svg>
