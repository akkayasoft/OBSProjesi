<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Inter, system-ui, sans-serif">
  <rect width="1000" height="720" fill="#f4f6f9"/>

  <!-- Toolbar -->
  <rect x="0" y="0" width="1000" height="60" fill="#0d6efd"/>
  <text x="24" y="38" font-size="20" fill="#fff">🎓 Karne Önizleme</text>
  <rect x="780" y="14" width="100" height="32" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="830" y="35" text-anchor="middle" font-size="13" fill="#fff">🖨️ Yazdır</text>
  <rect x="890" y="14" width="100" height="32" rx="4" fill="#198754"/>
  <text x="940" y="35" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">📄 PDF</text>

  <!-- A4 paper -->
  <g filter="url(#sh)">
    <rect x="100" y="80" width="800" height="620" fill="#ffffff"/>
  </g>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Header -->
  <text x="500" y="115" text-anchor="middle" font-size="18" font-weight="700" fill="#212529">BİLFEN DERSHANESİ</text>
  <text x="500" y="138" text-anchor="middle" font-size="14" fill="#495057">2025–2026 Eğitim Öğretim Yılı · 2. Dönem</text>
  <text x="500" y="158" text-anchor="middle" font-size="22" font-weight="700" fill="#0d6efd">DÖNEM KARNESİ</text>
  <line x1="140" y1="175" x2="860" y2="175" stroke="#0d6efd" stroke-width="2"/>

  <!-- Student info -->
  <g font-size="12">
    <text x="140" y="205" fill="#6c757d">Ad Soyad:</text>
    <text x="240" y="205" fill="#212529" font-weight="600">Demo Öğrenci 1</text>
    <text x="540" y="205" fill="#6c757d">Sınıf:</text>
    <text x="600" y="205" fill="#212529" font-weight="600">9-A</text>

    <text x="140" y="225" fill="#6c757d">Numara:</text>
    <text x="240" y="225" fill="#212529" font-weight="600">101</text>
    <text x="540" y="225" fill="#6c757d">Dönem:</text>
    <text x="600" y="225" fill="#212529" font-weight="600">2025-2026 Bahar</text>
  </g>

  <!-- Grades table -->
  <rect x="140" y="250" width="720" height="40" fill="#0d6efd"/>
  <g font-size="11" fill="#fff" font-weight="600">
    <text x="160" y="275">DERS</text>
    <text x="370" y="275">SINAV 1</text>
    <text x="450" y="275">SINAV 2</text>
    <text x="530" y="275">PROJE</text>
    <text x="610" y="275">ORT.</text>
    <text x="690" y="275">SINIF ORT.</text>
    <text x="800" y="275">DURUM</text>
  </g>

  <g font-size="12">
    <rect x="140" y="290" width="720" height="36" fill="#fff" stroke="#dee2e6"/>
    <text x="160" y="313" fill="#212529" font-weight="600">Matematik</text>
    <text x="380" y="313" fill="#495057">88</text>
    <text x="460" y="313" fill="#495057">82</text>
    <text x="540" y="313" fill="#495057">90</text>
    <text x="615" y="313" fill="#198754" font-weight="700">86.7</text>
    <text x="710" y="313" fill="#6c757d">76.4</text>
    <rect x="790" y="298" width="55" height="22" rx="11" fill="#198754"/>
    <text x="817" y="313" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Geçti</text>

    <rect x="140" y="326" width="720" height="36" fill="#f8f9fa" stroke="#dee2e6"/>
    <text x="160" y="349" fill="#212529" font-weight="600">Türkçe</text>
    <text x="380" y="349" fill="#495057">95</text>
    <text x="460" y="349" fill="#495057">88</text>
    <text x="540" y="349" fill="#495057">85</text>
    <text x="615" y="349" fill="#198754" font-weight="700">89.3</text>
    <text x="710" y="349" fill="#6c757d">82.1</text>
    <rect x="790" y="334" width="55" height="22" rx="11" fill="#198754"/>
    <text x="817" y="349" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Geçti</text>

    <rect x="140" y="362" width="720" height="36" fill="#fff" stroke="#dee2e6"/>
    <text x="160" y="385" fill="#212529" font-weight="600">Fen Bilimleri</text>
    <text x="380" y="385" fill="#495057">75</text>
    <text x="460" y="385" fill="#495057">70</text>
    <text x="540" y="385" fill="#495057">82</text>
    <text x="615" y="385" fill="#212529" font-weight="700">75.7</text>
    <text x="710" y="385" fill="#6c757d">71.0</text>
    <rect x="790" y="370" width="55" height="22" rx="11" fill="#198754"/>
    <text x="817" y="385" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Geçti</text>

    <rect x="140" y="398" width="720" height="36" fill="#f8f9fa" stroke="#dee2e6"/>
    <text x="160" y="421" fill="#212529" font-weight="600">Sosyal Bilgiler</text>
    <text x="380" y="421" fill="#495057">82</text>
    <text x="460" y="421" fill="#495057">85</text>
    <text x="540" y="421" fill="#495057">88</text>
    <text x="615" y="421" fill="#198754" font-weight="700">85.0</text>
    <text x="710" y="421" fill="#6c757d">78.5</text>
    <rect x="790" y="406" width="55" height="22" rx="11" fill="#198754"/>
    <text x="817" y="421" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Geçti</text>

    <rect x="140" y="434" width="720" height="36" fill="#fff" stroke="#dee2e6"/>
    <text x="160" y="457" fill="#212529" font-weight="600">İngilizce</text>
    <text x="380" y="457" fill="#495057">68</text>
    <text x="460" y="457" fill="#495057">72</text>
    <text x="540" y="457" fill="#495057">75</text>
    <text x="615" y="457" fill="#212529" font-weight="700">71.7</text>
    <text x="710" y="457" fill="#6c757d">68.2</text>
    <rect x="790" y="442" width="55" height="22" rx="11" fill="#198754"/>
    <text x="817" y="457" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Geçti</text>
  </g>

  <!-- Summary -->
  <rect x="140" y="495" width="720" height="80" rx="6" fill="#e3f2fd"/>
  <text x="160" y="525" font-size="13" font-weight="700" fill="#0d6efd">DÖNEM ORTALAMASI</text>
  <text x="800" y="540" text-anchor="end" font-size="32" font-weight="700" fill="#0d6efd">81.7</text>
  <text x="160" y="552" font-size="11" fill="#495057">Sınıf içi sıra: <tspan font-weight="600">5 / 28</tspan></text>
  <text x="160" y="568" font-size="11" fill="#495057">Devamsızlık: <tspan font-weight="600">3 gün</tspan> (limit 30) — <tspan fill="#198754" font-weight="600">Sınıfını başarıyla tamamladı</tspan></text>

  <!-- Footer -->
  <text x="500" y="640" text-anchor="middle" font-size="11" fill="#6c757d">Karne Tarihi: 25.05.2026</text>
  <text x="200" y="675" text-anchor="middle" font-size="11" fill="#212529">______________________________</text>
  <text x="200" y="690" text-anchor="middle" font-size="10" fill="#495057">Sınıf Öğretmeni</text>
  <text x="800" y="675" text-anchor="middle" font-size="11" fill="#212529">______________________________</text>
  <text x="800" y="690" text-anchor="middle" font-size="10" fill="#495057">Müdür</text>
</svg>
