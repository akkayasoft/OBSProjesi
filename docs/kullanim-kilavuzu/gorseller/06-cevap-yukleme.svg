<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" font-family="Inter, system-ui, sans-serif">
  <rect width="1280" height="600" fill="#f4f6f9"/>
  <rect x="0" y="0" width="1280" height="60" fill="#0d6efd"/>
  <text x="24" y="38" font-size="20" fill="#fff">🎓 Bilfen</text>
  <rect x="0" y="60" width="240" height="540" fill="#212529"/>

  <text x="270" y="100" font-size="22" font-weight="700" fill="#212529">📋 2026 Mayıs TYT — Cevap Yükleme</text>

  <g>
    <rect x="270" y="130" width="170" height="38" rx="6" fill="#0d6efd"/>
    <text x="355" y="155" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">📤 Cevaplar</text>
    <rect x="445" y="130" width="170" height="38" rx="6" fill="#fff" stroke="#dee2e6"/>
    <text x="530" y="155" text-anchor="middle" font-size="13" fill="#495057">📊 Puanlama</text>
    <rect x="620" y="130" width="170" height="38" rx="6" fill="#fff" stroke="#dee2e6"/>
    <text x="705" y="155" text-anchor="middle" font-size="13" fill="#495057">🏆 Sıralama</text>
    <rect x="795" y="130" width="170" height="38" rx="6" fill="#fff" stroke="#dee2e6"/>
    <text x="880" y="155" text-anchor="middle" font-size="13" fill="#495057">📈 Net Analizi</text>
  </g>

  <rect x="270" y="190" width="990" height="380" rx="6" fill="#fff" stroke="#dee2e6"/>

  <!-- Drop zone -->
  <rect x="320" y="230" width="490" height="280" rx="8" fill="#f8f9fa" stroke="#0d6efd" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="565" y="320" text-anchor="middle" font-size="48" fill="#0d6efd">⬆️</text>
  <text x="565" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#212529">Optik okuyucu CSV'sini buraya sürükle</text>
  <text x="565" y="395" text-anchor="middle" font-size="12" fill="#6c757d">veya</text>
  <rect x="475" y="410" width="180" height="40" rx="6" fill="#0d6efd"/>
  <text x="565" y="435" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">📁 DOSYA SEÇ</text>
  <text x="565" y="475" text-anchor="middle" font-size="11" fill="#6c757d">CSV, max 10 MB · ogrenci_no, cevap kolonları</text>

  <!-- Right info -->
  <text x="850" y="230" font-size="13" font-weight="700" fill="#212529">📌 KILAVUZ</text>
  <line x1="850" y1="240" x2="1230" y2="240" stroke="#e9ecef"/>
  <g font-size="11" fill="#495057">
    <text x="850" y="265">CSV formatı:</text>
    <rect x="850" y="275" width="380" height="50" rx="4" fill="#212529"/>
    <text x="864" y="295" font-size="10" fill="#0dcaf0" font-family="monospace">ogrenci_no,turkce,matematik,fen,sosyal</text>
    <text x="864" y="315" font-size="10" fill="#fff" font-family="monospace">101,DDDYYBYDD...,DYYDDYYDD...,...</text>

    <text x="850" y="350" fill="#495057">Cevap karakterleri:</text>
    <text x="850" y="370" font-weight="600" fill="#198754">D = Doğru</text>
    <text x="950" y="370" font-weight="600" fill="#dc3545">Y = Yanlış</text>
    <text x="1050" y="370" font-weight="600" fill="#6c757d">B = Boş</text>

    <text x="850" y="405" fill="#495057">Manuel giriş:</text>
    <rect x="850" y="415" width="380" height="34" rx="4" fill="#fff" stroke="#dee2e6"/>
    <text x="1040" y="436" text-anchor="middle" font-size="12" fill="#0d6efd" font-weight="600">📝 Tek tek elle gir →</text>

    <text x="850" y="475" fill="#fd7e14" font-weight="600">⚠️  Mevcut sonuçlar varsa üzerine yazılır</text>
  </g>
</svg>
