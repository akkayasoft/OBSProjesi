<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, system-ui, sans-serif">
  <rect width="1280" height="720" fill="#f4f6f9"/>
  <rect x="0" y="0" width="1280" height="60" fill="#0d6efd"/>
  <text x="24" y="38" font-size="20" fill="#fff">🎓 Bilfen</text>
  <rect x="0" y="60" width="240" height="660" fill="#212529"/>

  <text x="270" y="100" font-size="22" font-weight="700" fill="#212529">📊 Yeni Deneme Sınavı</text>

  <!-- Sablon secimi -->
  <text x="270" y="145" font-size="13" font-weight="700" fill="#212529">1. ŞABLON SEÇ</text>
  <g>
    <rect x="270" y="160" width="200" height="100" rx="8" fill="#fff" stroke="#0d6efd" stroke-width="2"/>
    <text x="370" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#0d6efd">TYT</text>
    <text x="370" y="215" text-anchor="middle" font-size="11" fill="#495057">120 soru</text>
    <text x="370" y="232" text-anchor="middle" font-size="11" fill="#495057">Türkçe·Mat·Fen·Sosyal</text>
    <text x="370" y="250" text-anchor="middle" font-size="10" fill="#198754" font-weight="600">✓ SEÇİLİ</text>

    <rect x="490" y="160" width="200" height="100" rx="8" fill="#fff" stroke="#dee2e6"/>
    <text x="590" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#212529">AYT</text>
    <text x="590" y="215" text-anchor="middle" font-size="11" fill="#495057">160 soru</text>
    <text x="590" y="232" text-anchor="middle" font-size="11" fill="#495057">Sayısal/Sözel/EA/Dil</text>

    <rect x="710" y="160" width="200" height="100" rx="8" fill="#fff" stroke="#dee2e6"/>
    <text x="810" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#212529">LGS</text>
    <text x="810" y="215" text-anchor="middle" font-size="11" fill="#495057">90 soru</text>
    <text x="810" y="232" text-anchor="middle" font-size="11" fill="#495057">Sözel + Sayısal</text>

    <rect x="930" y="160" width="200" height="100" rx="8" fill="#fff" stroke="#dee2e6" stroke-dasharray="4 4"/>
    <text x="1030" y="190" text-anchor="middle" font-size="14" font-weight="600" fill="#6c757d">+ ÖZEL ŞABLON</text>
    <text x="1030" y="215" text-anchor="middle" font-size="11" fill="#adb5bd">Kendi soru dağılımın</text>
  </g>

  <!-- Form -->
  <text x="270" y="290" font-size="13" font-weight="700" fill="#212529">2. SINAV BİLGİLERİ</text>

  <rect x="270" y="305" width="990" height="200" rx="6" fill="#fff" stroke="#dee2e6"/>
  <g font-size="11" fill="#495057">
    <text x="290" y="335">Sınav Adı *</text>
    <rect x="290" y="345" width="320" height="36" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="302" y="368" font-size="13" fill="#212529">2026 Mayıs TYT Denemesi</text>

    <text x="630" y="335">Tarih *</text>
    <rect x="630" y="345" width="180" height="36" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="642" y="368" font-size="13" fill="#212529">15.05.2026</text>

    <text x="830" y="335">Saat</text>
    <rect x="830" y="345" width="120" height="36" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="842" y="368" font-size="13" fill="#212529">09:00</text>

    <text x="970" y="335">Süre (dk)</text>
    <rect x="970" y="345" width="100" height="36" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="982" y="368" font-size="13" fill="#212529">135</text>

    <text x="290" y="410">Sınıflar (çoklu seçim) *</text>
    <rect x="290" y="420" width="780" height="60" rx="4" fill="#fff" stroke="#ced4da"/>
    <g>
      <rect x="300" y="430" width="60" height="40" rx="4" fill="#0d6efd"/>
      <text x="330" y="455" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">9-A ✓</text>
      <rect x="368" y="430" width="60" height="40" rx="4" fill="#0d6efd"/>
      <text x="398" y="455" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">9-B ✓</text>
      <rect x="436" y="430" width="60" height="40" rx="4" fill="#0d6efd"/>
      <text x="466" y="455" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">10-A ✓</text>
      <rect x="504" y="430" width="60" height="40" rx="4" fill="#fff" stroke="#dee2e6"/>
      <text x="534" y="455" text-anchor="middle" font-size="12" fill="#495057">10-B</text>
      <rect x="572" y="430" width="60" height="40" rx="4" fill="#0d6efd"/>
      <text x="602" y="455" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">11-A ✓</text>
      <rect x="640" y="430" width="60" height="40" rx="4" fill="#fff" stroke="#dee2e6"/>
      <text x="670" y="455" text-anchor="middle" font-size="12" fill="#495057">11-B</text>
      <rect x="708" y="430" width="60" height="40" rx="4" fill="#0d6efd"/>
      <text x="738" y="455" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">12-A ✓</text>
      <rect x="776" y="430" width="60" height="40" rx="4" fill="#fff" stroke="#dee2e6"/>
      <text x="806" y="455" text-anchor="middle" font-size="12" fill="#495057">12-B</text>
    </g>
  </g>

  <!-- Soru dağılımı -->
  <text x="270" y="535" font-size="13" font-weight="700" fill="#212529">3. SORU DAĞILIMI (TYT şablonu)</text>
  <rect x="270" y="550" width="990" height="100" rx="6" fill="#fff" stroke="#dee2e6"/>
  <g font-size="12">
    <text x="290" y="580" fill="#495057">Türkçe:</text>
    <rect x="350" y="565" width="80" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="390" y="585" text-anchor="middle" font-size="13" font-weight="600">40</text>

    <text x="450" y="580" fill="#495057">Matematik:</text>
    <rect x="525" y="565" width="80" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="565" y="585" text-anchor="middle" font-size="13" font-weight="600">40</text>

    <text x="625" y="580" fill="#495057">Fen:</text>
    <rect x="660" y="565" width="80" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="700" y="585" text-anchor="middle" font-size="13" font-weight="600">20</text>

    <text x="760" y="580" fill="#495057">Sosyal:</text>
    <rect x="810" y="565" width="80" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="850" y="585" text-anchor="middle" font-size="13" font-weight="600">20</text>

    <text x="920" y="580" fill="#212529" font-weight="600">TOPLAM:</text>
    <text x="1000" y="580" fill="#0d6efd" font-weight="700">120 soru</text>

    <rect x="290" y="610" width="180" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="302" y="628" font-size="11" fill="#495057">Yanlış cezası: ☑ Aktif (-0.25)</text>

    <rect x="490" y="610" width="220" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="502" y="628" font-size="11" fill="#495057">Optik form: PDF üretilecek ✓</text>
  </g>

  <!-- Footer -->
  <rect x="1100" y="675" width="160" height="38" rx="6" fill="#198754"/>
  <text x="1180" y="699" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">✓ DENEMEYİ OLUŞTUR</text>
</svg>
