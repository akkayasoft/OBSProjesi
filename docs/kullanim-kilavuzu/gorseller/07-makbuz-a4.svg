  <text x="620" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#0d6efd" font-family="monospace">KS-20260508</text>
  <text x="620" y="234" text-anchor="middle" font-size="10" fill="#0d6efd" font-family="monospace">-0042</text>

  <!-- Tarih -->
  <text x="100" y="265" font-size="12" font-weight="600" fill="#6c757d">TARİH</text>
  <text x="180" y="265" font-size="13" font-weight="700" fill="#212529">08.05.2026</text>

  <!-- Öğrenci kartı -->
  <rect x="100" y="290" width="600" height="120" rx="6" fill="#f8f9fa"/>
  <text x="120" y="320" font-size="11" fill="#6c757d" font-weight="600">ÖĞRENCİ BİLGİLERİ</text>
  <line x1="120" y1="330" x2="680" y2="330" stroke="#dee2e6"/>
  <g font-size="12">
