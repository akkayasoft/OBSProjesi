  <text x="120" y="612" font-size="14" fill="#fff" font-weight="700">TOPLAM TAHSİL EDİLEN</text>
  <text x="680" y="612" text-anchor="end" font-size="22" fill="#fff" font-weight="700">1.500,00 ₺</text>

  <!-- Açıklama -->
  <text x="100" y="660" font-size="11" fill="#6c757d" font-weight="600">AÇIKLAMA</text>
  <rect x="100" y="670" width="600" height="60" rx="4" fill="#f8f9fa" stroke="#dee2e6"/>
  <text x="120" y="695" font-size="12" fill="#212529">2025-2026 Bahar Dönemi · Mayıs ayı 4. taksit</text>
  <text x="120" y="713" font-size="11" fill="#6c757d" font-style="italic">Yalnız: Bin Beş Yüz Türk Lirası</text>

  <!-- İmza alanları -->
  <rect x="100" y="780" width="280" height="100" rx="6" fill="#fff" stroke="#dee2e6"/>
  <text x="240" y="800" text-anchor="middle" font-size="11" fill="#6c757d" font-weight="600">ÖDEYEN</text>
  <line x1="120" y1="855" x2="360" y2="855" stroke="#212529"/>
  <text x="240" y="870" text-anchor="middle" font-size="11" fill="#212529">Demo Veli 1</text>

  <rect x="420" y="780" width="280" height="100" rx="6" fill="#fff" stroke="#dee2e6"/>
  <text x="560" y="800" text-anchor="middle" font-size="11" fill="#6c757d" font-weight="600">TESLİM ALAN</text>
  <line x1="440" y1="855" x2="680" y2="855" stroke="#212529"/>
  <text x="560" y="870" text-anchor="middle" font-size="11" fill="#212529">Ahmet Yılmaz (Muhasebe)</text>

  <!-- Footer -->
  <text x="400" y="915" text-anchor="middle" font-size="10" fill="#adb5bd">Bu makbuz dijital olarak üretilmiştir · obs.akkayasoft.com</text>
