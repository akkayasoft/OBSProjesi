    <text x="240" y="500">VADE TARİHİ</text>
    <text x="380" y="500">ÖDEME TÜRÜ</text>
    <text x="520" y="500">ÖDEYEN</text>
    <text x="680" y="500" text-anchor="end">TUTAR</text>
  </g>

  <rect x="100" y="515" width="600" height="44" fill="#fff" stroke="#dee2e6"/>
  <g font-size="13">
    <text x="120" y="542" fill="#212529" font-weight="600">4 / 8</text>
    <text x="240" y="542" fill="#212529">10.05.2026</text>
    <rect x="375" y="528" width="100" height="22" rx="11" fill="#e3f2fd"/>
    <text x="425" y="542" text-anchor="middle" font-size="11" fill="#0d6efd" font-weight="700">💵 NAKİT</text>
    <text x="520" y="542" fill="#212529">Demo Veli 1</text>
    <text x="680" y="542" text-anchor="end" fill="#198754" font-weight="700">1.500,00 ₺</text>
