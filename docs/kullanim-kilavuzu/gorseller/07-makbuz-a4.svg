<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="1000" fill="#e9ecef"/>

  <!-- A4 paper -->
  <g filter="url(#sh)">
    <rect x="80" y="40" width="640" height="900" fill="#fff"/>
  </g>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.2"/>
