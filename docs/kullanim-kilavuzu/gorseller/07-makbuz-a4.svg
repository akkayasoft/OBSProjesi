    <text x="500" y="355" fill="#212529" font-weight="700">9-A</text>

    <text x="120" y="378" fill="#6c757d">TC Kimlik:</text>
    <text x="220" y="378" fill="#212529" font-family="monospace">12345678901</text>

    <text x="450" y="378" fill="#6c757d">Numara:</text>
    <text x="500" y="378" fill="#212529" font-family="monospace">101</text>

    <text x="120" y="400" fill="#6c757d">Veli:</text>
    <text x="220" y="400" fill="#212529">Demo Veli 1 (0532 111 22 33)</text>
  </g>

  <!-- Ödeme detayı -->
  <text x="100" y="450" font-size="12" font-weight="700" fill="#0d6efd">ÖDEME DETAYLARI</text>
