  <text x="135" y="118" text-anchor="middle" font-size="22" fill="#0d6efd">🎓</text>
  <text x="170" y="100" font-size="18" font-weight="700" fill="#fff">BİLFEN DERSHANESİ</text>
  <text x="170" y="120" font-size="11" fill="#fff" opacity="0.9">Atatürk Mah. Cumhuriyet Cd. No:42 Çankaya/Ankara</text>
  <text x="170" y="138" font-size="11" fill="#fff" opacity="0.9">📞 0312 555 12 34   ✉️ info@bilfen.com</text>

  <!-- Title -->
  <text x="400" y="200" text-anchor="middle" font-size="22" font-weight="700" fill="#212529">TAHSİLAT MAKBUZU</text>
  <line x1="200" y1="220" x2="600" y2="220" stroke="#0d6efd" stroke-width="2"/>

  <!-- Top right: makbuz no -->
  <rect x="540" y="170" width="160" height="70" rx="6" fill="#fff" stroke="#0d6efd" stroke-width="2"/>
