<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="600" fill="rgba(0,0,0,0.5)"/>

  <!-- Modal -->
  <rect x="100" y="60" width="600" height="500" rx="10" fill="#fff"/>

  <!-- Header -->
  <rect x="100" y="60" width="600" height="60" rx="10" fill="#fff"/>
  <text x="130" y="98" font-size="18" font-weight="700" fill="#212529">+ Yeni Gelir/Gider Kaydı</text>
  <text x="670" y="98" text-anchor="end" font-size="20" fill="#6c757d">✕</text>
  <line x1="100" y1="120" x2="700" y2="120" stroke="#dee2e6"/>

  <!-- Form -->
  <g font-size="11" fill="#495057">
    <text x="130" y="150">Tür *</text>
    <rect x="130" y="160" width="180" height="40" rx="4" fill="#d4edda" stroke="#198754" stroke-width="2"/>
    <text x="220" y="184" text-anchor="middle" font-size="13" fill="#155724" font-weight="600">🟢 Gelir</text>
    <rect x="320" y="160" width="180" height="40" rx="4" fill="#fff" stroke="#dee2e6"/>
    <text x="410" y="184" text-anchor="middle" font-size="13" fill="#6c757d">🔴 Gider</text>

    <text x="130" y="225">Kategori *</text>
    <rect x="130" y="235" width="370" height="36" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="142" y="258" font-size="12" fill="#212529">Öğrenci Aidatı ▾</text>

    <text x="510" y="225">Tutar (₺) *</text>
    <rect x="510" y="235" width="160" height="36" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="522" y="258" font-size="13" fill="#212529" font-weight="600">1.500,00</text>

    <text x="130" y="295">Tarih *</text>
    <rect x="130" y="305" width="180" height="36" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="142" y="328" font-size="12" fill="#212529">08.05.2026</text>

    <text x="320" y="295">Banka Hesabı</text>
    <rect x="320" y="305" width="180" height="36" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="332" y="328" font-size="12" fill="#212529">Ziraat 1234 ▾</text>

    <text x="510" y="295">Belge No</text>
    <rect x="510" y="305" width="160" height="36" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="522" y="328" font-size="12" fill="#adb5bd">opsiyonel</text>

    <text x="130" y="365">Açıklama</text>
    <rect x="130" y="375" width="540" height="80" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="142" y="398" font-size="12" fill="#212529">Demo Öğrenci 1 — Mayıs ayı 4. taksit ödemesi</text>
    <text x="142" y="416" font-size="12" fill="#212529" font-style="italic">(banka havalesi)</text>

    <text x="130" y="490" font-size="11" fill="#dc3545">* zorunlu alanlar</text>
  </g>

  <!-- Footer -->
  <line x1="100" y1="510" x2="700" y2="510" stroke="#dee2e6"/>
  <rect x="450" y="525" width="100" height="32" rx="4" fill="#fff" stroke="#dee2e6"/>
  <text x="500" y="546" text-anchor="middle" font-size="12" fill="#6c757d">Vazgeç</text>
  <rect x="560" y="525" width="120" height="32" rx="4" fill="#198754"/>
  <text x="620" y="546" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">✓ KAYDET</text>

  <!-- Outside background hint -->
  <text x="400" y="40" text-anchor="middle" font-size="13" fill="#fff" opacity="0.85">Modal penceresi (yeni gelir/gider kaydı)</text>
</svg>
