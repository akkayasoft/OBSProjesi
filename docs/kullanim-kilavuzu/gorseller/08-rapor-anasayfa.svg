<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" font-family="Inter, system-ui, sans-serif">
  <rect width="1280" height="700" fill="#f4f6f9"/>
  <rect x="0" y="0" width="1280" height="60" fill="#0d6efd"/>
  <text x="24" y="38" font-size="20" fill="#fff">🎓 Bilfen</text>
  <rect x="0" y="60" width="240" height="640" fill="#212529"/>

  <text x="270" y="100" font-size="22" font-weight="700" fill="#212529">📈 Raporlar</text>

  <!-- KPI 4 row -->
  <g>
    <rect x="270" y="130" width="240" height="100" rx="8" fill="#fff" stroke="#dee2e6"/>
    <rect x="270" y="130" width="5" height="100" fill="#0d6efd"/>
    <text x="290" y="160" font-size="11" fill="#6c757d" font-weight="600">AKTİF ÖĞRENCİ</text>
    <text x="290" y="200" font-size="32" font-weight="700">247</text>

    <rect x="530" y="130" width="240" height="100" rx="8" fill="#fff" stroke="#dee2e6"/>
    <rect x="530" y="130" width="5" height="100" fill="#198754"/>
    <text x="550" y="160" font-size="11" fill="#6c757d" font-weight="600">BU AY NET</text>
    <text x="550" y="200" font-size="26" font-weight="700" fill="#198754">+14.150 ₺</text>

    <rect x="790" y="130" width="240" height="100" rx="8" fill="#ffc107"/>
    <rect x="790" y="130" width="5" height="100" fill="#856404"/>
    <text x="810" y="160" font-size="11" fill="#212529" font-weight="600">⏳ BEKLEYEN TAHSİLAT</text>
    <text x="810" y="195" font-size="26" font-weight="700" fill="#856404">38.500 ₺</text>
    <text x="810" y="218" font-size="10" fill="#212529" font-weight="600">Tıkla — kim ne kadar borçlu →</text>

    <rect x="1050" y="130" width="210" height="100" rx="8" fill="#fff" stroke="#dee2e6"/>
    <rect x="1050" y="130" width="5" height="100" fill="#dc3545"/>
    <text x="1070" y="160" font-size="11" fill="#6c757d" font-weight="600">GECİKEN TAKSİT</text>
    <text x="1070" y="195" font-size="26" font-weight="700" fill="#dc3545">12</text>
    <text x="1070" y="218" font-size="10" fill="#dc3545">8.450 ₺ bekliyor</text>
  </g>

  <!-- Komisyon ozeti -->
  <text x="270" y="270" font-size="13" font-weight="700" fill="#212529">KOMİSYON ÖZETİ (Sürücü Kursu)</text>
  <g>
    <rect x="270" y="285" width="490" height="130" rx="6" fill="#fff" stroke="#dee2e6"/>
    <rect x="270" y="285" width="5" height="130" fill="#198754"/>
    <text x="290" y="312" font-size="13" font-weight="700" fill="#198754">📈 Yönlendirme Komisyonu (Gelir)</text>
    <line x1="290" y1="322" x2="750" y2="322" stroke="#e9ecef"/>
    <g font-size="12">
      <text x="290" y="350" fill="#6c757d">Toplam:</text>
      <text x="370" y="350" fill="#212529" font-weight="600">8.500 ₺</text>
      <text x="290" y="375" fill="#6c757d">Tahsil edilen:</text>
      <text x="395" y="375" fill="#198754" font-weight="600">6.200 ₺</text>
      <text x="290" y="400" fill="#6c757d">Bekleyen:</text>
      <text x="380" y="400" fill="#fd7e14" font-weight="600">2.300 ₺</text>
      <text x="730" y="395" text-anchor="end" fill="#0d6efd" font-size="11">Detay →</text>
    </g>

    <rect x="780" y="285" width="480" height="130" rx="6" fill="#fff" stroke="#dee2e6"/>
    <rect x="780" y="285" width="5" height="130" fill="#dc3545"/>
    <text x="800" y="312" font-size="13" font-weight="700" fill="#dc3545">📉 Komisyon Ödemeleri (Gider)</text>
    <line x1="800" y1="322" x2="1240" y2="322" stroke="#e9ecef"/>
    <g font-size="12">
      <text x="800" y="350" fill="#6c757d">Toplam:</text>
      <text x="880" y="350" fill="#212529" font-weight="600">5.200 ₺</text>
      <text x="800" y="375" fill="#6c757d">Ödenen:</text>
      <text x="870" y="375" fill="#198754" font-weight="600">3.500 ₺</text>
      <text x="800" y="400" fill="#6c757d">Bekleyen:</text>
      <text x="890" y="400" fill="#dc3545" font-weight="600">1.700 ₺</text>
      <text x="1220" y="395" text-anchor="end" fill="#0d6efd" font-size="11">Detay →</text>
    </g>
  </g>

  <!-- Mali trend chart preview -->
  <text x="270" y="455" font-size="13" font-weight="700" fill="#212529">MALİ TREND (son 6 ay)</text>
  <rect x="270" y="470" width="990" height="210" rx="6" fill="#fff" stroke="#dee2e6"/>

  <!-- Y axis -->
  <g font-size="9" fill="#adb5bd">
    <text x="290" y="500">50K</text>
    <text x="290" y="540">25K</text>
    <text x="290" y="580">0</text>
    <text x="290" y="620">-25K</text>
  </g>
  <line x1="320" y1="495" x2="1240" y2="495" stroke="#f1f3f5"/>
  <line x1="320" y1="540" x2="1240" y2="540" stroke="#f1f3f5"/>
  <line x1="320" y1="580" x2="1240" y2="580" stroke="#dee2e6"/>
  <line x1="320" y1="620" x2="1240" y2="620" stroke="#f1f3f5"/>

  <!-- Income line -->
  <polyline points="370,540 530,520 690,500 850,510 1010,498 1170,492"
            fill="none" stroke="#198754" stroke-width="3"/>
  <!-- Expense line -->
  <polyline points="370,560 530,565 690,558 850,572 1010,562 1170,558"
            fill="none" stroke="#dc3545" stroke-width="3"/>
  <!-- Net line -->
  <polyline points="370,575 530,560 690,545 850,555 1010,540 1170,535"
            fill="none" stroke="#0d6efd" stroke-width="3" stroke-dasharray="4 4"/>

  <!-- Dots -->
  <g>
    <circle cx="370" cy="540" r="4" fill="#198754"/>
    <circle cx="530" cy="520" r="4" fill="#198754"/>
    <circle cx="690" cy="500" r="4" fill="#198754"/>
    <circle cx="850" cy="510" r="4" fill="#198754"/>
    <circle cx="1010" cy="498" r="4" fill="#198754"/>
    <circle cx="1170" cy="492" r="6" fill="#198754" stroke="#fff" stroke-width="2"/>
  </g>

  <g font-size="9" fill="#6c757d">
    <text x="370" y="650" text-anchor="middle">Aralık</text>
    <text x="530" y="650" text-anchor="middle">Ocak</text>
    <text x="690" y="650" text-anchor="middle">Şubat</text>
    <text x="850" y="650" text-anchor="middle">Mart</text>
    <text x="1010" y="650" text-anchor="middle">Nisan</text>
    <text x="1170" y="650" text-anchor="middle">Mayıs</text>
  </g>

  <!-- Legend -->
  <g font-size="11">
    <line x1="900" y1="478" x2="930" y2="478" stroke="#198754" stroke-width="3"/>
    <text x="940" y="482" fill="#495057">Gelir</text>
    <line x1="990" y1="478" x2="1020" y2="478" stroke="#dc3545" stroke-width="3"/>
    <text x="1030" y="482" fill="#495057">Gider</text>
    <line x1="1080" y1="478" x2="1110" y2="478" stroke="#0d6efd" stroke-width="3" stroke-dasharray="4 4"/>
    <text x="1120" y="482" fill="#495057">Net</text>
  </g>
</svg>
