  <rect x="1100" y="85" width="160" height="40" rx="6" fill="#fff" stroke="#0d6efd"/>
  <text x="1180" y="110" text-anchor="middle" font-size="12" fill="#0d6efd" font-weight="600">✓ Tümünü Okudu</text>

  <!-- Filter tabs -->
  <g>
    <rect x="270" y="150" width="120" height="36" rx="6" fill="#0d6efd"/>
    <text x="330" y="173" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Hepsi (15)</text>
    <rect x="395" y="150" width="120" height="36" rx="6" fill="#fff" stroke="#dee2e6"/>
    <text x="455" y="173" text-anchor="middle" font-size="12" fill="#495057">Okunmamış (12)</text>
