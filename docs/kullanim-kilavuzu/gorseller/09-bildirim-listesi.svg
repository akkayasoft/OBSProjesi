    <rect x="625" y="150" width="100" height="36" rx="6" fill="#fff" stroke="#dee2e6"/>
    <text x="675" y="173" text-anchor="middle" font-size="12" fill="#495057">Mali (5)</text>
  </g>

  <!-- List -->
  <rect x="270" y="200" width="990" height="380" rx="6" fill="#fff" stroke="#dee2e6"/>

  <g font-size="12">
