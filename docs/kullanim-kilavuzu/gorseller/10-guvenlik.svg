<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="Inter, system-ui, sans-serif">
  <rect width="1100" height="500" fill="#f4f6f9"/>
  <text x="40" y="40" font-size="18" font-weight="700" fill="#212529">🔒 Güvenlik Ayarları</text>

  <rect x="40" y="70" width="520" height="400" rx="6" fill="#fff" stroke="#dee2e6"/>
  <text x="60" y="100" font-size="13" font-weight="700" fill="#212529">ŞİFRE KURALLARI</text>
  <line x1="60" y1="112" x2="540" y2="112" stroke="#e9ecef"/>

  <g font-size="11">
    <text x="60" y="140" fill="#495057">Minimum karakter sayısı</text>
    <rect x="430" y="125" width="100" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="480" y="145" text-anchor="middle" font-size="13" font-weight="600">8</text>

    <text x="60" y="180" fill="#495057">Büyük harf zorunlu mu?</text>
    <rect x="430" y="165" width="40" height="28" rx="4" fill="#198754"/>
    <text x="450" y="185" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">EVET</text>

    <text x="60" y="220" fill="#495057">Sayı zorunlu mu?</text>
    <rect x="430" y="205" width="40" height="28" rx="4" fill="#198754"/>
    <text x="450" y="225" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">EVET</text>

    <text x="60" y="260" fill="#495057">Özel karakter (!@#$) zorunlu?</text>
    <rect x="430" y="245" width="40" height="28" rx="4" fill="#fff" stroke="#dee2e6"/>
    <text x="450" y="265" text-anchor="middle" font-size="11" fill="#6c757d">HAYIR</text>

    <text x="60" y="320" fill="#212529" font-weight="600">HESAP KİLİTLEME</text>
    <line x1="60" y1="332" x2="540" y2="332" stroke="#e9ecef"/>

    <text x="60" y="360" fill="#495057">Yanlış deneme sayısı</text>
    <rect x="430" y="345" width="100" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="480" y="365" text-anchor="middle" font-size="13" font-weight="600">5</text>

    <text x="60" y="400" fill="#495057">Kilit süresi (dakika)</text>
    <rect x="430" y="385" width="100" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="480" y="405" text-anchor="middle" font-size="13" font-weight="600">15</text>

    <text x="60" y="440" fill="#495057">Otomatik kilit açılsın mı?</text>
    <rect x="430" y="425" width="40" height="28" rx="4" fill="#198754"/>
    <text x="450" y="445" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">EVET</text>
  </g>

  <!-- Right card -->
  <rect x="580" y="70" width="480" height="400" rx="6" fill="#fff" stroke="#dee2e6"/>
  <text x="600" y="100" font-size="13" font-weight="700" fill="#212529">OTURUM AYARLARI</text>
  <line x1="600" y1="112" x2="1040" y2="112" stroke="#e9ecef"/>

  <g font-size="11">
    <text x="600" y="140" fill="#495057">Oturum süresi</text>
    <rect x="900" y="125" width="140" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="970" y="145" text-anchor="middle" font-size="13" font-weight="600">24 saat ▾</text>

    <text x="600" y="180" fill="#495057">Hareketsiz oturum kilidi</text>
    <rect x="900" y="165" width="140" height="28" rx="4" fill="#fff" stroke="#ced4da"/>
    <text x="970" y="185" text-anchor="middle" font-size="13" font-weight="600">30 dk ▾</text>

    <text x="600" y="240" fill="#212529" font-weight="600">2FA (İki Faktörlü Doğrulama)</text>
    <line x1="600" y1="252" x2="1040" y2="252" stroke="#e9ecef"/>

    <text x="600" y="280" fill="#495057">Yöneticiler için 2FA</text>
    <rect x="900" y="265" width="140" height="28" rx="4" fill="#fff" stroke="#dee2e6"/>
    <text x="970" y="285" text-anchor="middle" font-size="11" fill="#6c757d">Opsiyonel ▾</text>

    <text x="600" y="320" fill="#495057">SMS doğrulama</text>
    <rect x="900" y="305" width="140" height="28" rx="4" fill="#fff" stroke="#dee2e6"/>
    <text x="970" y="325" text-anchor="middle" font-size="11" fill="#6c757d">Devre dışı ▾</text>

    <text x="600" y="380" fill="#212529" font-weight="600">SON GİRİŞLER</text>
    <text x="600" y="405" font-size="10" fill="#198754">✓ Bugün 09:14 — 192.168.1.42 (Chrome/Mac)</text>
    <text x="600" y="425" font-size="10" fill="#198754">✓ Dün 17:32 — 92.55.x.x (Mobile/Android)</text>
    <text x="600" y="445" font-size="10" fill="#dc3545">✗ 06.05 02:14 — Bilinmeyen IP (engellendi)</text>
  </g>
</svg>
